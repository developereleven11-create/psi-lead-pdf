name: Run PageSpeed Batch

# Click "Run workflow" in the Actions tab — no terminal, ever.
on:
  workflow_dispatch:
    inputs:
      csv:
        description: 'Lead CSV filename inside leads/'
        required: true
        default: 'Diamond Priority Outreach.csv'
      start:
        description: 'Start at row (1 = first lead)'
        required: true
        default: '1'
      count:
        description: 'How many leads to test this run'
        required: true
        default: '150'

permissions:
  contents: write

jobs:
  pagespeed:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run PageSpeed batch
        env:
          PSI_API_KEY: ${{ secrets.PSI_API_KEY }}
        run: |
          node scripts/run-psi.js \
            --csv "leads/${{ github.event.inputs.csv }}" \
            --start "${{ github.event.inputs.start }}" \
            --count "${{ github.event.inputs.count }}" \
            --out "results/psi_results.csv" \
            --json-dir "results/lhr"

      - name: Commit results back to the repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/
          git diff --staged --quiet || git commit -m "PSI batch: rows ${{ github.event.inputs.start }}+${{ github.event.inputs.count }}"
          git push

      - name: Upload results as a downloadable artifact
        uses: actions/upload-artifact@v4
        with:
          name: psi-results
          path: results/
          retention-days: 30
